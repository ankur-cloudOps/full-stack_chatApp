apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: chatapp-cluster
  region: ap-south-1
  version: "1.33"

iam:
  withOIDC: true

cloudWatch:
  clusterLogging:
    enableTypes: ["*"]

managedNodeGroups:
  - name: app-workers

    instanceType: t3.small

    amiFamily: AmazonLinux2023

    desiredCapacity: 2
    minSize: 2
    maxSize: 4

    volumeSize: 20
    volumeType: gp3

    privateNetworking: true

    labels:
      role: application

    tags:
      Environment: dev
      Project: full-stack-chat-app